<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>행사 상세 보기 | 도서관</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-blue: #003366; /* 누나가 쓰던 남색 변수 추가 */
        }
        body { font-family: "Pretendard", sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 30px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        .header { border-bottom: 2px solid var(--primary-blue); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 24px; color: #1a1a1a; margin: 0; }
        .status { padding: 5px 15px; background: #eef2f7; color: var(--primary-blue); border-radius: 20px; font-weight: 600; font-size: 14px; }

        .content-wrapper { display: flex; gap: 40px; margin-bottom: 40px; }
        .poster { width: 300px; height: 420px; background: #eee; border-radius: 8px; overflow: hidden; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }

        .info-table { flex: 1; border-top: 1px solid #333; }
        .info-row { display: flex; border-bottom: 1px solid #eee; align-items: center; }
        .info-label { width: 100px; background: #f9f9f9; padding: 15px; font-weight: 600; font-size: 15px; color: #555; }
        .info-value { flex: 1; padding: 15px; font-size: 15px; color: #333; }

        .btn-group { text-align: center; border-top: 1px solid #eee; padding-top: 30px; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 12px 35px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.2s; }

        /* 버튼 색상을 누나가 작업한 메인 블루(#003366)로 통일! */
        .btn-list { background: var(--primary-blue); color: #fff; border: none; }
        .btn-list:hover { background: #002244; opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 th:text="${dto.title}">행사 제목</h1>
    </div>

    <div class="content-wrapper">
        <div class="poster">
            <img th:if="${dto.imageName}" th:src="@{'/display?fileName=' + ${dto.imageName}}" alt="행사 포스터">
            <div th:unless="${dto.imageName}" style="display:flex; align-items:center; justify-content:center; height:100%; color: #999; background:#f0f0f0;">이미지 준비중</div>
        </div>

        <div class="info-table">
            <div class="info-row">
                <div class="info-label">카테고리</div>
                <div class="info-value">
                    <span th:if="${dto.category == 'G'}">강좌·세미나</span>
                    <span th:if="${dto.category == 'M'}">주말 극장</span>
                    <span th:if="${dto.category == 'E'}">행사</span>
                </div>
            </div>
            <div class="info-row">
                <div class="info-label">일시</div>
                <div class="info-value" th:text="${#temporals.format(dto.eventDate, 'yyyy-MM-dd HH:mm')}">일시 정보</div>
            </div>
            <div class="info-row">
                <div class="info-label">장소</div>
                <div class="info-value" th:text="${dto.place}">장소 정보</div>
            </div>
            <div class="info-row">
                <div class="info-label">비고</div>
                <div class="info-value" th:text="${dto.extraInfo}">비고 정보</div>
            </div>
            <div class="info-row" style="border-bottom: 1px solid #333;">
                <div class="info-label">내용</div>
                <div class="info-value" th:text="${dto.content}">상세 내용</div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <a th:if="${dto.category == 'G'}"
           th:href="@{/event/lecture}" class="btn btn-list">목록으로</a>

        <a th:if="${dto.category == 'M'}"
           th:href="@{/event/cinema}" class="btn btn-list">목록으로</a>

        <a th:if="${dto.category != 'G' and dto.category != 'M'}"
           th:href="@{/event/list}" class="btn btn-list">목록으로</a>
    </div>

</body>
</html>
